name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Least privilege by default; only the GitHub-release jobs escalate to write.
permissions:
  contents: read

# Never cancel a release mid-flight (a cancelled publish can leave a half-done
# release); serialise per-ref instead.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-versions:
    name: Verify versions match tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag and verify manifests
        id: v
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          bash .github/scripts/check-versions.sh "$version"

  build-suidhelper:
    name: Build suidhelper (${{ matrix.target }})
    needs: verify-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    defaults:
      run:
        working-directory: native/suidhelper
    steps:
      - uses: actions/checkout@v7

      # rustup reads native/suidhelper/rust-toolchain.toml on the first cargo
      # call and installs the pinned nightly + both musl targets.
      - name: Show toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/suidhelper

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage renamed artifact
        run: |
          v="${{ needs.verify-versions.outputs.version }}"
          out="hyper-suidhelper-${v}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/hyper-suidhelper" "dist/${out}"

      - uses: actions/upload-artifact@v4
        with:
          name: suidhelper-${{ matrix.target }}
          path: native/suidhelper/dist/*
          if-no-files-found: error

  build-hex:
    name: Build Hex package
    needs: verify-versions
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v7

      - uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: "1.20"
          otp-version: "28"

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-release-mix-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-mix-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Build package tarball
        run: mix hex.build --output "hypervm-${{ needs.verify-versions.outputs.version }}.tar"

      - uses: actions/upload-artifact@v4
        with:
          name: hex-package
          path: hypervm-*.tar
          if-no-files-found: error

  github-release:
    name: Draft GitHub release
    needs: [verify-versions, build-suidhelper, build-hex]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets and compute checksums
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'hyper-suidhelper-*' -o -name 'hypervm-*.tar' \) \
            -exec cp {} release/ \;
          ( cd release && sha256sum hyper-suidhelper-* hypervm-*.tar > SHA256SUMS )
          ls -la release

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*

  publish-crate:
    name: Publish to crates.io
    needs: [verify-versions, build-suidhelper, github-release]
    runs-on: ubuntu-latest
    environment: release
    defaults:
      run:
        working-directory: native/suidhelper
    steps:
      - uses: actions/checkout@v7

      - name: Show toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/suidhelper

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
